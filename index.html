<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>C&C Salgados e Doces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#ea1d2c;
  --brand-dark:#b91120;
  --bg:#f7f7f7;
  --card:#fff;
  --text:#1f1f1f;
  --muted:#717171;
  --line:#eeeeee;
  --green:#13a665;
  --red:#d82432;
  --purple:#8a35df;
  --orange:#b75a12;
  --radius:16px;
  --shadow:0 12px 36px rgba(0,0,0,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html{
  scroll-behavior:smooth;
  touch-action:manipulation;
  -webkit-text-size-adjust:100%;
}
body{
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--text);
  background:var(--bg);
  overflow-x:hidden;
}
button,input,textarea{font-family:inherit}
button,
.product-row,
.category-chip,
.cart-float,
.qty-btn,
.checkout-btn,
.close-btn,
.pay-option{
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  -webkit-user-select:none;
}
img{max-width:100%;display:block}
.app-shell{
  max-width:760px;
  margin:0 auto;
  min-height:100vh;
  background:#fff;
}
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#fff;
  padding:12px 16px 10px;
  border-bottom:1px solid var(--line);
}
.status-line{
  display:flex;
  align-items:center;
  gap:10px;
}
.back-btn{
  border:0;
  background:transparent;
  color:var(--brand);
  font-size:28px;
  line-height:1;
  width:32px;
  height:32px;
  display:grid;
  place-items:center;
  cursor:pointer;
}
.logo-mini{
  width:38px;
  height:38px;
  border-radius:12px;
  object-fit:cover;
  border:1px solid #f0d8a7;
}
.search-wrap{
  flex:1;
  height:42px;
  background:#f1f1f1;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 12px;
  min-width:0;
}
.search-wrap span{color:#777;font-size:18px}
.search-wrap input{
  width:100%;
  border:0;
  outline:0;
  background:transparent;
  font-size:14px;
  color:#333;
}
.store-head{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 16px 12px;
  background:#fff;
}
.store-logo{
  width:60px;
  height:60px;
  border-radius:18px;
  object-fit:cover;
  border:1px solid #ead39a;
  background:#fff8e8;
}
.store-title h1{
  font-size:20px;
  line-height:1.1;
  font-weight:900;
  letter-spacing:-.02em;
}
.store-title p{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}
.category-nav{
  position:sticky;
  top:65px;
  z-index:45;
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 16px;
  background:#fff;
  border-bottom:1px solid var(--line);
  scrollbar-width:none;
}
.category-nav::-webkit-scrollbar{display:none}
.category-chip{
  flex:0 0 auto;
  border:0;
  background:#fff;
  color:#4b4b4b;
  font-size:14px;
  font-weight:700;
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
}
.category-chip.active{
  background:#fee7e9;
  color:var(--brand);
}
.menu{
  padding:8px 0 110px;
}
.section-block{
  scroll-margin-top:128px;
  border-top:8px solid var(--bg);
  background:#fff;
}
.section-title{
  font-size:19px;
  font-weight:900;
  letter-spacing:-.02em;
  padding:18px 16px 10px;
}
.product-row{
  display:grid;
  grid-template-columns:1fr 112px;
  gap:12px;
  padding:16px;
  border-top:1px solid var(--line);
  background:#fff;
  cursor:pointer;
}
.product-info{
  min-width:0;
}
.product-title{
  font-size:17px;
  font-weight:700;
  line-height:1.25;
  letter-spacing:-.015em;
}
.product-desc{
  margin-top:6px;
  color:#666;
  font-size:14px;
  line-height:1.35;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.price-line{
  display:flex;
  align-items:center;
  gap:7px;
  flex-wrap:wrap;
  margin-top:10px;
}
.price{
  color:#202020;
  font-size:17px;
  font-weight:800;
}
.price-note{
  color:#666;
  font-size:12px;
  font-weight:800;
}
.old-price{
  color:#aaa;
  font-size:14px;
  text-decoration:line-through;
}
.discount{
  display:inline-flex;
  align-items:center;
  color:#fff;
  background:var(--purple);
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  padding:2px 7px;
}
.badge{
  display:inline-flex;
  margin-top:8px;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  color:var(--purple);
  background:#f5eafb;
}
.badge.orange{
  color:var(--orange);
  background:#fff3e8;
}
.product-img{
  width:112px;
  height:112px;
  object-fit:cover;
  border-radius:16px;
  background:#eee;
}
.empty-search{
  text-align:center;
  padding:48px 22px;
  color:var(--muted);
}
.cart-float{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translate(-50%,120px);
  width:min(728px,calc(100vw - 24px));
  height:58px;
  background:var(--brand);
  color:#fff;
  border:0;
  border-radius:999px;
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  box-shadow:0 12px 28px rgba(234,29,44,.32);
  z-index:60;
  cursor:pointer;
  transition:transform .28s ease;
}
.cart-float.show{transform:translate(-50%,0)}
.cart-float strong{font-size:15px}
.cart-float span{font-size:13px;opacity:.9}
.cart-count-pill{
  width:28px;
  height:28px;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  display:grid;
  place-items:center;
  font-size:13px;
  font-weight:900;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.48);
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
  z-index:100;
}
.overlay.open{
  opacity:1;
  pointer-events:auto;
}
.sheet{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translate(-50%,100%);
  width:min(760px,100vw);
  max-height:92vh;
  background:#fff;
  border-radius:24px 24px 0 0;
  z-index:110;
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow);
  transition:transform .28s cubic-bezier(.2,.8,.2,1);
  overflow:hidden;
}
.sheet.open{transform:translate(-50%,0)}
.sheet-handle{
  width:42px;
  height:5px;
  background:#ddd;
  border-radius:999px;
  margin:10px auto 0;
  flex-shrink:0;
}
.sheet-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 16px 12px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.sheet-head h2{
  font-size:19px;
  font-weight:900;
}
.close-btn{
  border:0;
  background:#f3f3f3;
  border-radius:50%;
  width:36px;
  height:36px;
  cursor:pointer;
  font-size:20px;
  color:#555;
}
.sheet-body{
  overflow-y:auto;
  flex:1;
  padding:0 16px 14px;
}
.modal-img{
  width:100%;
  height:210px;
  object-fit:cover;
  border-radius:18px;
  margin-top:14px;
  background:#eee;
}
.modal-title{
  font-size:22px;
  font-weight:900;
  letter-spacing:-.02em;
  line-height:1.15;
  margin-top:16px;
}
.modal-desc{
  color:#555;
  font-size:14px;
  line-height:1.45;
  margin-top:8px;
}
.modal-price{
  font-size:20px;
  font-weight:900;
  margin-top:12px;
}
.selector-card{
  margin-top:18px;
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
}
.selector-head{
  padding:14px;
  background:#fafafa;
  border-bottom:1px solid var(--line);
}
.selector-head h3{
  font-size:16px;
  font-weight:900;
}
.selector-head p{
  font-size:13px;
  color:#666;
  line-height:1.35;
  margin-top:4px;
}
.progress-box{
  margin-top:12px;
}
.progress-track{
  height:8px;
  background:#e9e9e9;
  border-radius:999px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:#b8b8b8;
  transition:width .2s ease,background .2s ease;
}
.progress-fill.ok{background:var(--green)}
.progress-fill.error{background:var(--red)}
.progress-text{
  display:flex;
  justify-content:space-between;
  gap:8px;
  margin-top:7px;
  font-size:12px;
  font-weight:800;
  color:#777;
}
.progress-text.ok{color:var(--green)}
.progress-text.error{color:var(--red)}
.option-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:13px 14px;
  border-top:1px solid var(--line);
}
.option-row:first-child{border-top:0}
.option-name{
  font-size:14px;
  font-weight:700;
  line-height:1.25;
}
.qty-control{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.qty-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  border:1px solid #ddd;
  background:#fff;
  color:var(--brand);
  font-weight:900;
  font-size:18px;
  cursor:pointer;
  display:grid;
  place-items:center;
}
.qty-btn:disabled{
  opacity:.35;
  cursor:not-allowed;
}
.qty-number{
  min-width:30px;
  text-align:center;
  font-weight:900;
  font-size:14px;
}
.modal-footer{
  border-top:1px solid var(--line);
  padding:12px 16px max(12px,env(safe-area-inset-bottom));
  background:#fff;
  flex-shrink:0;
}
.item-qty-line{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.item-qty-line span{
  font-weight:800;
}
.add-cart-btn,
.checkout-btn{
  width:100%;
  height:52px;
  border:0;
  border-radius:999px;
  background:var(--brand);
  color:#fff;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
}
.add-cart-btn:disabled,
.checkout-btn:disabled{
  background:#d6d6d6;
  color:#888;
  cursor:not-allowed;
}
.cart-body{
  padding:12px 16px 4px;
}
.cart-item{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid var(--line);
}
.cart-thumb{
  width:56px;
  height:56px;
  border-radius:12px;
  object-fit:cover;
  flex-shrink:0;
}
.cart-item-main{
  flex:1;
  min-width:0;
}
.cart-item-title{
  font-size:14px;
  font-weight:800;
  line-height:1.25;
}
.cart-item-custom{
  margin-top:4px;
  font-size:12px;
  color:#666;
  line-height:1.35;
}
.cart-price{
  margin-top:6px;
  font-size:14px;
  font-weight:900;
}
.cart-item-side{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
}
.cart-small-qty .qty-btn{
  width:28px;
  height:28px;
  font-size:16px;
}
.cart-small-qty .qty-number{
  min-width:20px;
}
.checkout-form{
  padding:12px 16px 16px;
}
.form-card{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}
.form-card label,
.pay-title{
  display:block;
  font-size:13px;
  font-weight:900;
  margin-bottom:8px;
}
textarea{
  width:100%;
  min-height:74px;
  resize:vertical;
  border:1px solid #e5e5e5;
  border-radius:12px;
  outline:0;
  padding:10px 11px;
  font-size:14px;
}
.pay-options{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.pay-option{
  border:1px solid #e5e5e5;
  background:#fff;
  border-radius:12px;
  padding:10px 8px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  text-align:center;
}
.pay-option.active{
  border-color:var(--brand);
  background:#fff1f2;
  color:var(--brand);
}
.summary{
  display:grid;
  gap:6px;
  margin:12px 0;
}
.sum-row{
  display:flex;
  justify-content:space-between;
  color:#666;
  font-size:14px;
}
.sum-row.total{
  color:#111;
  font-size:17px;
  font-weight:900;
  padding-top:8px;
  border-top:1px dashed #ddd;
}
.empty-cart{
  text-align:center;
  color:#777;
  padding:42px 16px;
}
.toast{
  position:fixed;
  left:50%;
  bottom:92px;
  transform:translate(-50%,14px);
  background:#222;
  color:#fff;
  border-radius:999px;
  padding:10px 16px;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
  z-index:200;
  font-size:13px;
  font-weight:800;
}
.toast.show{
  opacity:1;
  transform:translate(-50%,0);
}

.selected-label{
  margin-top:5px;
  display:inline-flex;
  align-items:center;
  background:#eaf8f1;
  color:var(--green);
  border-radius:999px;
  padding:3px 8px;
  font-size:12px;
  font-weight:900;
}
.info-card{
  margin:0 16px 16px;
  border:1px solid var(--line);
  border-radius:20px;
  background:#fff;
  overflow:hidden;
  display:grid;
  grid-template-columns:112px 1fr;
}
.info-card img{
  width:112px;
  height:112px;
  object-fit:cover;
  background:#f5f5f5;
}
.info-card-text{
  padding:14px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.info-card-text strong{
  font-size:15px;
  line-height:1.35;
}
.info-card-text span{
  margin-top:6px;
  color:#666;
  font-size:13px;
  line-height:1.35;
}
@media (max-width:420px){
  .info-card{
    grid-template-columns:96px 1fr;
  }
  .info-card img{
    width:96px;
    height:112px;
  }
}

@media (max-width:420px){
  .product-row{
    grid-template-columns:1fr 100px;
    padding:14px 16px;
  }
  .product-img{
    width:100px;
    height:100px;
    border-radius:14px;
  }
  .product-title{font-size:16px}
  .product-desc{font-size:14px}
  .modal-img{height:190px}
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="status-line">
      <button class="back-btn" type="button" aria-label="Voltar">‹</button>
      <img src="assets/logo.png" alt="Logo C&C Salgados e Doces" class="logo-mini">
      <div class="search-wrap">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="Buscar em C&C Salgados e Doces" autocomplete="off">
      </div>
    </div>
  </header>

  <section class="store-head">
    <img src="assets/logo.png" alt="C&C Salgados e Doces" class="store-logo">
    <div class="store-title">
      <h1>C&C Salgados e Doces</h1>
      <p>Salgadinhos fritos, combos, bolinho caipira e mini churros</p>
    </div>
  </section>

  <nav class="category-nav" id="categoryNav" aria-label="Categorias do cardápio"></nav>
  <main class="menu" id="menu"></main>
</div>

<button class="cart-float" id="cartFloat" type="button" onclick="openCart()">
  <div class="cart-count-pill" id="cartFloatQty">0</div>
  <div style="text-align:left;flex:1">
    <strong>Ver pedido</strong><br>
    <span id="cartFloatTotal">R$ 0,00</span>
  </div>
  <strong>→</strong>
</button>

<div class="overlay" id="modalOverlay" onclick="closeAllSheets()"></div>

<section class="sheet" id="productSheet" aria-modal="true" role="dialog">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <h2>Detalhes do item</h2>
    <button class="close-btn" type="button" onclick="closeProductSheet()">×</button>
  </div>
  <div class="sheet-body" id="productSheetBody"></div>
  <div class="modal-footer" id="productSheetFooter"></div>
</section>

<section class="sheet" id="cartSheet" aria-modal="true" role="dialog">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <h2>Meu pedido</h2>
    <button class="close-btn" type="button" onclick="closeCart()">×</button>
  </div>
  <div class="sheet-body" id="cartSheetBody"></div>
</section>

<div class="toast" id="toast"></div>

const WHATSAPP_NUMBER = '5512991097648';

let cart = [];
let currentProduct = null;
let productQty = 1;
let selectedOptions = {};
let activeCategory = DATA.sections[0].id;

const money = (v) => 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',');


function sectionById(id){
  return DATA.sections.find(s => s.id === id);
}

function productById(id){
  return DATA.products.find(p => p.id === id);
}

function renderCategories(){
  const nav = document.getElementById('categoryNav');
  nav.innerHTML = DATA.sections.map(section => `
    <button type="button" class="category-chip ${section.id===activeCategory?'active':''}" onclick="goToSection('${section.id}')">
      ${section.name}
    </button>
  `).join('');
}

function goToSection(id){
  activeCategory = id;
  renderCategories();
  const el = document.getElementById('section-' + id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderMenu(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const menu = document.getElementById('menu');

  let any = false;
  const blocks = DATA.sections.map(section => {
    if(section.type === 'info'){
      const infoText = [section.name, section.text].join(' ').toLowerCase();
      if(q && !infoText.includes(q)) return '';
      any = true;
      return `
        <section class="section-block" id="section-${section.id}">
          <h2 class="section-title">${section.name}</h2>
          <div class="info-card">
            <img src="${section.image}" alt="${section.name}">
            <div class="info-card-text">
              <strong>A maioria trabalha com salgados de 08 a 12g.</strong>
              <span>Nossos salgados são de aproximadamente 20 gramas, fica a dica.</span>
            </div>
          </div>
        </section>
      `;
    }

    const products = DATA.products.filter(p => p.section === section.id).filter(p => {
      if(!q) return true;
      return [p.title, p.description, section.name].join(' ').toLowerCase().includes(q);
    });

    if(!products.length) return '';
    any = true;

    return `
      <section class="section-block" id="section-${section.id}">
        <h2 class="section-title">${section.name}</h2>
        ${products.map(renderProductRow).join('')}
      </section>
    `;
  }).join('');

  menu.innerHTML = any ? blocks : `
    <div class="empty-search">
      <h3>Nenhum item encontrado</h3>
      <p>Tente buscar por salgadinho, churros, combo, bolinho ou bebida.</p>
    </div>
  `;
}

function renderProductRow(product){
  return `
    <article class="product-row" onclick="openProduct('${product.id}')">
      <div class="product-info">
        <h3 class="product-title">${product.title}</h3>
        <p class="product-desc">${product.description}</p>
        <div class="price-line">
          <span class="price">${money(product.price)}</span><span class="price-note">Pix ou dinheiro</span>
        </div>
      </div>
      <img class="product-img" src="${product.image}" alt="${product.title}">
    </article>
  `;
}

function openProduct(id){
  const product = productById(id);
  if(!product) return;
  currentProduct = product;
  productQty = 1;
  selectedOptions = {};
  if(product.selection){
    product.selection.options.forEach(o => selectedOptions[o.id] = 0);
  }

  renderProductSheet();
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('productSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeProductSheet(){
  document.getElementById('productSheet').classList.remove('open');
  if(!document.getElementById('cartSheet').classList.contains('open')){
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function renderProductSheet(){
  if(!currentProduct) return;
  const p = currentProduct;
  const body = document.getElementById('productSheetBody');
  const footer = document.getElementById('productSheetFooter');

  body.innerHTML = `
    <img class="modal-img" src="${p.image}" alt="${p.title}">
    <h2 class="modal-title">${p.title}</h2>
    <p class="modal-desc">${p.description}</p>
    <div class="modal-price">${money(p.price)} <span class="price-note">Pix ou dinheiro</span></div>
    ${p.selection ? renderSelection(p.selection) : ''}
  `;

  footer.innerHTML = `
    <div class="item-qty-line">
      <span>Quantidade do item</span>
      <div class="qty-control">
        <button class="qty-btn" type="button" onclick="changeProductQty(-1)" ${productQty<=1?'disabled':''}>−</button>
        <span class="qty-number">${productQty}</span>
        <button class="qty-btn" type="button" onclick="changeProductQty(1)">+</button>
      </div>
    </div>
    <button class="add-cart-btn" type="button" onclick="addCurrentToCart()" ${canAddCurrent()?'':'disabled'}>
      ${canAddCurrent() ? `Adicionar • ${money(p.price * productQty)}` : addButtonText()}
    </button>
  `;
}

function renderSelection(selection){
  const status = selectionStatus(selection);
  return `
    <div class="selector-card">
      <div class="selector-head">
        <h3>${selection.title}</h3>
        <p>${selection.help}</p>
        <div class="progress-box">
          <div class="progress-track">
            <div class="progress-fill ${status.ok?'ok':status.error?'error':''}" style="width:${status.percent}%"></div>
          </div>
          <div class="progress-text ${status.ok?'ok':status.error?'error':''}">
            <span>${status.total}/${selection.requiredTotal} ${selection.unitLabel}</span>
            <span>${status.flavors}/${selection.maxFlavors} sabores</span>
          </div>
        </div>
      </div>
      ${selection.options.map(o => `
        <div class="option-row">
          <div class="option-name">
            ${o.name}
            ${(selectedOptions[o.id] || 0) > 0 ? `<div class="selected-label">+${selectedOptions[o.id]} ${o.name}</div>` : ''}
          </div>
          <div class="qty-control">
            <button class="qty-btn" type="button" onclick="changeOption('${o.id}', -${selection.step})" ${(selectedOptions[o.id]||0)<=0?'disabled':''}>−</button>
            <span class="qty-number">${selectedOptions[o.id] || 0}</span>
            <button class="qty-btn" type="button" onclick="changeOption('${o.id}', ${selection.step})">+</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function changeOption(id, delta){
  if(!currentProduct || !currentProduct.selection) return;
  selectedOptions[id] = Math.max(0, (selectedOptions[id] || 0) + delta);
  renderProductSheet();
}

function selectionStatus(selection){
  const quantities = Object.values(selectedOptions).map(Number);
  const total = quantities.reduce((a,b)=>a+b,0);
  const flavors = quantities.filter(v => v > 0).length;
  const tooManyItems = total > selection.requiredTotal;
  const tooManyFlavors = flavors > selection.maxFlavors;
  const ok = total === selection.requiredTotal && flavors > 0 && flavors <= selection.maxFlavors;
  return {
    total,
    flavors,
    ok,
    error: tooManyItems || tooManyFlavors,
    percent: Math.min(100, Math.round((total / selection.requiredTotal) * 100))
  };
}

function canAddCurrent(){
  if(!currentProduct) return false;
  if(!currentProduct.selection) return true;
  return selectionStatus(currentProduct.selection).ok;
}

function addButtonText(){
  if(!currentProduct || !currentProduct.selection) return 'Adicionar';
  const st = selectionStatus(currentProduct.selection);
  const s = currentProduct.selection;
  if(st.total > s.requiredTotal) return `Remova ${st.total - s.requiredTotal} unidades`;
  if(st.flavors > s.maxFlavors) return `Escolha no máximo ${s.maxFlavors} sabores`;
  return `Faltam ${s.requiredTotal - st.total} ${s.unitLabel}`;
}

function changeProductQty(delta){
  productQty = Math.max(1, productQty + delta);
  renderProductSheet();
}

function selectedDescription(product){
  if(!product.selection) return '';
  return product.selection.options
    .filter(o => (selectedOptions[o.id] || 0) > 0)
    .map(o => `+${selectedOptions[o.id]} ${o.name}`)
    .join(' · ');
}

function addCurrentToCart(){
  if(!canAddCurrent()) return;
  const p = currentProduct;
  const custom = selectedDescription(p);
  const key = p.id + '|' + custom;
  const existing = cart.find(item => item.key === key);
  if(existing){
    existing.qty += productQty;
  }else{
    cart.push({
      key,
      id:p.id,
      title:p.title,
      price:p.price,
      image:p.image,
      qty:productQty,
      custom
    });
  }
  updateCartFloat();
  closeProductSheet();
  showToast('Item adicionado ao pedido');
}

function cartTotal(){
  return cart.reduce((sum,item)=>sum + item.price * item.qty, 0);
}

function cartQty(){
  return cart.reduce((sum,item)=>sum + item.qty, 0);
}

function updateCartFloat(){
  const float = document.getElementById('cartFloat');
  document.getElementById('cartFloatQty').textContent = cartQty();
  document.getElementById('cartFloatTotal').textContent = money(cartTotal());
  float.classList.toggle('show', cart.length > 0);
}

function openCart(){
  renderCart();
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('cartSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart(){
  document.getElementById('cartSheet').classList.remove('open');
  if(!document.getElementById('productSheet').classList.contains('open')){
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function closeAllSheets(){
  document.getElementById('productSheet').classList.remove('open');
  document.getElementById('cartSheet').classList.remove('open');
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

          <div class="cart-item-main">
            <div class="cart-item-title">${item.title}</div>
            ${item.custom ? `<div class="cart-item-custom">${item.custom}</div>` : ''}
            <div class="cart-price">${money(item.price * item.qty)}</div>
          </div>
          <div class="cart-item-side">
            <div class="qty-control cart-small-qty">
              <button class="qty-btn" type="button" onclick="changeCartQty(${index}, -1)">−</button>
              <span class="qty-number">${item.qty}</span>
              <button class="qty-btn" type="button" onclick="changeCartQty(${index}, 1)">+</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="checkout-form">
      <div class="form-card">
        <label for="obs">Observações do pedido</label>
        <textarea id="obs" placeholder="Ex: horário de retirada, endereço, ponto de referência..."></textarea>
      </div>

      <div class="summary">
        <div class="sum-row"><span>Itens</span><span>${money(cartTotal())}</span></div>
        <div class="sum-row"><span>Entrega</span><span>A combinar</span></div>
        <div class="sum-row total"><span>Total</span><span>${money(cartTotal())}</span></div>
      </div>

      <button class="checkout-btn" type="button" onclick="sendWhatsApp()">Finalizar pelo WhatsApp</button>
    </div>
  `;
}


function changeCartQty(index, delta){
  const item = cart[index];
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0){
    cart.splice(index,1);
  }
  updateCartFloat();
  renderCart();
}

function sendWpp(){
  if(cart.length === 0){
    showToast('Adicione itens ao pedido primeiro');
    return;
  }

  const obsEl = document.getElementById('obs');
  const obs = obsEl ? obsEl.value.trim() : '';

  const total = cart.reduce((sum, item) => {
    return sum + (item.unitPrice * item.qty);
  }, 0);

  const linhas = [];

  linhas.push('*Olá! Gostaria de finalizar este pedido:*');
  linhas.push('');
  linhas.push('*C&C Salgados e Doces*');
  linhas.push('');

  cart.forEach((item, index) => {
    linhas.push(`${index + 1}. *${item.name}*`);

    if(item.qty && item.qty > 1){
      linhas.push(`Quantidade: ${item.qty}`);
    }

    if(item.note){
      linhas.push('');
      linhas.push('*Sabores escolhidos:*');

      item.note
        .split('·')
        .map(s => s.trim())
        .filter(Boolean)
        .forEach(sabor => {
          linhas.push(`- ${sabor}`);
        });
    }

    linhas.push(`Valor: ${fmt(item.unitPrice * item.qty)}`);
    linhas.push('');
  });

  linhas.push(`*Total do pedido: ${fmt(total)}*`);
  linhas.push('');
  linhas.push('Entrega: a combinar');

  if(obs){
    linhas.push('');
    linhas.push('*Observações:*');
    linhas.push(obs);
  }

  linhas.push('');
  linhas.push('Pode confirmar a disponibilidade, por favor?');

  const message = linhas.join('\n');

  const phone = 'SEU_NUMERO_AQUI';
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  window.open(url, '_blank');
}

function showToast(text){
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(()=>toast.classList.remove('show'), 1800);
}

document.getElementById('searchInput').addEventListener('input', renderMenu);

window.addEventListener('scroll', () => {
  const blocks = [...document.querySelectorAll('.section-block')];
  const current = blocks.findLast(block => block.getBoundingClientRect().top <= 140);
  if(current){
    const id = current.id.replace('section-','');
    if(id !== activeCategory){
      activeCategory = id;
      renderCategories();
    }
  }
});

renderCategories();
renderMenu();
updateCartFloat();
</script>
</body>
</html>
